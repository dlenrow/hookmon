syntax = "proto3";

package hookmon.v1;

option go_package = "github.com/dlenrow/hookmon/gen/hookmon/v1;hookmonv1";

import "google/protobuf/timestamp.proto";

enum EventType {
  EVENT_TYPE_UNSPECIFIED = 0;
  EVENT_TYPE_BPF_LOAD = 1;
  EVENT_TYPE_BPF_ATTACH = 2;
  EVENT_TYPE_EXEC_INJECTION = 3;
  EVENT_TYPE_SHM_CREATE = 4;
  EVENT_TYPE_DLOPEN = 5;
  EVENT_TYPE_LINKER_CONFIG = 6;
  EVENT_TYPE_PTRACE_INJECT = 7;
  EVENT_TYPE_LIB_INTEGRITY = 8;
  EVENT_TYPE_AGENT_OFFLINE = 9;
  EVENT_TYPE_AGENT_RECOVERED = 10;
  EVENT_TYPE_ELF_RPATH = 11;
}

enum Severity {
  SEVERITY_UNSPECIFIED = 0;
  SEVERITY_INFO = 1;
  SEVERITY_WARN = 2;
  SEVERITY_ALERT = 3;
  SEVERITY_CRITICAL = 4;
}

message HookEvent {
  string id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string host_id = 3;
  string hostname = 4;
  EventType event_type = 5;
  Severity severity = 6;

  // Process context
  uint32 pid = 10;
  uint32 ppid = 11;
  uint32 uid = 12;
  uint32 gid = 13;
  string comm = 14;
  string cmdline = 15;
  string exe_path = 16;
  string exe_hash = 17;
  string cgroup_path = 18;
  string container_id = 19;
  string namespace = 20;

  // Type-specific payloads
  BPFDetail bpf_detail = 30;
  ExecInjectionDetail exec_injection_detail = 31;
  SHMDetail shm_detail = 32;
  DlopenDetail dlopen_detail = 33;
  LinkerConfigDetail linker_config_detail = 34;
  PtraceDetail ptrace_detail = 35;
  LibIntegrityDetail lib_integrity_detail = 36;
  ElfRpathDetail elf_rpath_detail = 37;
}

message BPFDetail {
  uint32 bpf_cmd = 1;
  uint32 prog_type = 2;
  string prog_name = 3;
  uint32 attach_type = 4;
  int32 target_fd = 5;
  uint32 insn_count = 6;
  string prog_hash = 7;
}

message ExecInjectionDetail {
  string library_path = 1;
  string library_hash = 2;
  string target_binary = 3;
  string set_by = 4;
  string env_var = 5;
}

message LinkerConfigDetail {
  string file_path = 1;
  string operation = 2;
  string old_hash = 3;
  string new_hash = 4;
}

message PtraceDetail {
  uint32 request = 1;
  string request_name = 2;
  uint32 target_pid = 3;
  string target_comm = 4;
  uint64 addr = 5;
}

message LibIntegrityDetail {
  string library_path = 1;
  string operation = 2;
  string old_hash = 3;
  string new_hash = 4;
  bool in_ld_cache = 5;
}

message SHMDetail {
  string shm_name = 1;
  uint64 size = 2;
  string pattern = 3;
}

message DlopenDetail {
  string library_path = 1;
  string library_hash = 2;
  int32 flags = 3;
}

message RpathEntry {
  string path = 1;
  string risk = 2;
  string reason = 3;
  bool exists = 4;
  bool is_rpath = 5;
}

message ElfRpathDetail {
  bool has_rpath = 1;
  bool has_runpath = 2;
  string rpath_raw = 3;
  string runpath_raw = 4;
  repeated RpathEntry entries = 5;
  string highest_risk = 6;
  bool uses_origin = 7;
  bool uses_deprecated = 8;
  bool is_setuid = 9;
}
