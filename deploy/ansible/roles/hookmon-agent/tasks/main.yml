---
- name: Create hookmon group
  group:
    name: hookmon
    system: true

- name: Create hookmon user
  user:
    name: hookmon
    group: hookmon
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/hookmon
    create_home: false

- name: Create directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: hookmon
    mode: "0750"
  loop:
    - /etc/hookmon
    - /var/log/hookmon

- name: Copy agent binary
  copy:
    src: hookmon-agent
    dest: /usr/bin/hookmon-agent
    owner: root
    group: root
    mode: "0755"
  notify: restart hookmon-agent

- name: Deploy agent config
  template:
    src: agent.yaml.j2
    dest: /etc/hookmon/agent.yaml
    owner: root
    group: hookmon
    mode: "0640"
  notify: restart hookmon-agent

- name: Install systemd unit
  copy:
    src: hookmon-agent.service
    dest: /etc/systemd/system/hookmon-agent.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - daemon-reload
    - restart hookmon-agent

- name: Enable and start hookmon-agent
  systemd:
    name: hookmon-agent
    enabled: true
    state: started

handlers:
  - name: daemon-reload
    systemd:
      daemon_reload: true

  - name: restart hookmon-agent
    systemd:
      name: hookmon-agent
      state: restarted
