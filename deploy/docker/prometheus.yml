global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts/*.yaml

scrape_configs:
  - job_name: hookmon-collector
    honor_labels: true
    static_configs:
      - targets: ["localhost:9091"]

  - job_name: hookmon-bus
    static_configs:
      - targets: ["infinichat-1:2112"]
        labels:
          instance: infinichat-1
